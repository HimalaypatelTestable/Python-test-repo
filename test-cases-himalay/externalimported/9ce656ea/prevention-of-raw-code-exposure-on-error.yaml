id: 1c8bf74d-10b9-437f-b61c-cfbd114fde45
title: "Prevention of Raw Code Exposure on Error"
suite: "external/imported"
category: "ImportedTests"
priority: P2
description: "Verify that the application does not expose raw stack traces, database queries, or code snippets when an invalid product URL is accessed."
steps:
  - action: "Open the web browser and navigate to the base URL of the e-commerce application."
    expected: "The application home page loads successfully."
  - action: "Modify the URL in the address bar to point to a non-existent product ID or an invalid path."
    expected: "The application displays a user-friendly error page (e.g., 404 Not Found or 500 Internal Server Error)."
  - action: "Inspect the page content and the browser console for any technical details."
    expected: "No raw stack traces, file paths, database schema names, or source code snippets are visible on the page. No sensitive server-side information is leaked in the response body or headers."
expected_result: "No raw stack traces, file paths, database schema names, or source code snippets are visible on the page. No sensitive server-side information is leaked in the response body or headers."
source: EXTERNAL_SOURCE
review_status: PENDING_REVIEW
