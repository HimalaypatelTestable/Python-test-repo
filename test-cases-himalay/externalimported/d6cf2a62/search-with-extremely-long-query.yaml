id: 50dd2a7c-2d6a-48e8-8556-1a9eae9efb2a
title: "Search with Extremely Long Query"
suite: "external/imported"
category: "ImportedTests"
priority: P2
description: "Verify that the application handles very long search queries (e.g., 255+ characters) without UI distortion or server-side errors."
steps:
  - action: "Navigate to the home page of the application"
    expected: "Home page loads successfully"
  - action: "Click on the 'Products' button in the navigation menu"
    expected: "User is navigated to the 'ALL PRODUCTS' page The full product list is visible"
  - action: "Enter a string exceeding 255 characters into the search input field"
    expected: "The input field accepts the text or truncates it based on defined limits without crashing"
  - action: "Click the 'Search' button"
    expected: "The page displays the 'SEARCHED PRODUCTS' heading The UI remains intact without distortion or broken layouts No server-side errors (e.g., 500 Internal Server Error) are displayed An empty results list or a 'No products found' message is displayed gracefully"
expected_result: "The page displays the 'SEARCHED PRODUCTS' heading The UI remains intact without distortion or broken layouts No server-side errors (e.g., 500 Internal Server Error) are displayed An empty results list or a 'No products found' message is displayed gracefully"
source: EXTERNAL_SOURCE
review_status: PENDING_REVIEW
