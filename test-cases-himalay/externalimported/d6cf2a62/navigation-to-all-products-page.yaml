title: "Navigation to All Products Page"
suite: "external/imported"
category: "ImportedTests"
priority: P2
description: "Verify that clicking the 'Products' link from the home page or navigation menu correctly redirects the user to the 'ALL PRODUCTS' page and displays the complete product catalog."
steps:
  - action: "Launch the browser and navigate to the website home page."
    expected: "The home page loads successfully and the navigation menu is visible."
  - action: "Locate and click on the 'Products' link in the navigation menu."
    expected: "The user is redirected to the 'ALL PRODUCTS' page. The page URL updates to reflect the products section. A heading or title 'ALL PRODUCTS' is clearly visible on the page."
  - action: "Scroll through the page to inspect the product list."
    expected: "The full product catalog is displayed. Each product item shows relevant details such as name, image, and price."
expected_result: "The full product catalog is displayed. Each product item shows relevant details such as name, image, and price."
