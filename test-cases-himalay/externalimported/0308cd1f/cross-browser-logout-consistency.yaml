id: ef7537ab-1a15-4235-9a8b-2722db8b1f09
title: "Cross-Browser Logout Consistency"
suite: "external/imported"
category: "ImportedTests"
priority: P2
description: "Verify that the logout functionality and session termination behave consistently across different supported web browsers (e.g., Chrome, Firefox, Safari)."
steps:
  - action: "Open the application in a supported web browser (Chrome, Firefox, or Safari) and log in with valid credentials."
    expected: "User is successfully logged in. The navbar displays 'Logged in as test_user' and a 'Logout' button."
  - action: "Click on the 'Logout' button in the navigation bar."
    expected: "The user is redirected to the /login page. The 'Logged in as test_user' text is no longer visible in the navbar."
  - action: "Click the browser's 'Back' button to attempt to return to the previous authenticated page."
    expected: "The user is not granted access to the authenticated session. The application redirects the user back to the login page or shows an 'Unauthorized' message."
  - action: "Repeat the above steps in all other supported browsers (e.g., if started in Chrome, repeat in Firefox and Safari)."
    expected: "The logout behavior and session termination are consistent across all tested browsers."
expected_result: "The logout behavior and session termination are consistent across all tested browsers."
source: EXTERNAL_SOURCE
review_status: PENDING_REVIEW
