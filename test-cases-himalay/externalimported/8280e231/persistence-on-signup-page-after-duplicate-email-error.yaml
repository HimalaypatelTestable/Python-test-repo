id: 938c037c-e269-4a32-a99d-e76d511f0eda
title: "Persistence on Signup Page after Duplicate Email Error"
suite: "external/imported"
category: "ImportedTests"
priority: P2
description: "Verify that when a duplicate email error occurs, the user remains on the signup page and no account is created."
steps:
  - action: "Navigate to the website and click on the 'Signup / Login' button"
    expected: "The login/signup page is displayed The heading 'New User Signup!' is visible"
  - action: "Enter a name and an email address that is already registered in the system Click the 'Signup' button"
    expected: "An error message 'Email Address already exist!' is displayed The user is not redirected to the 'ENTER ACCOUNT INFORMATION' form The user remains on the signup page"
  - action: "Attempt to navigate to the login page and sign in with the duplicate email and a random password"
    expected: "The system does not allow login with new credentials, confirming no new account was created for the duplicate email"
expected_result: "The system does not allow login with new credentials, confirming no new account was created for the duplicate email"
source: EXTERNAL_SOURCE
review_status: PENDING_REVIEW
