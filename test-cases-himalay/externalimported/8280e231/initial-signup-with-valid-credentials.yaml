id: e59d20b0-1f9a-4e62-a30e-b9b41a2ac65a
title: "Initial Signup with Valid Credentials"
suite: "external/imported"
category: "ImportedTests"
priority: P2
description: "Verify that entering a unique name and a valid, unregistered email address allows the user to proceed to the account information form."
steps:
  - action: "Navigate to the website URL Click on the 'Signup / Login' button in the navigation bar"
    expected: "The login/signup page is displayed The heading 'New User Signup!' is visible"
  - action: "Locate the 'New User Signup!' section Enter a unique name in the 'Name' field Enter a valid, unregistered email address in the 'Email Address' field"
    expected: "The name and email fields accept the input"
  - action: "Click the 'Signup' button"
    expected: "The user is redirected to the account information page The heading 'ENTER ACCOUNT INFORMATION' is visible The 'Name' and 'Email' fields are pre-filled with the previously entered data"
expected_result: "The user is redirected to the account information page The heading 'ENTER ACCOUNT INFORMATION' is visible The 'Name' and 'Email' fields are pre-filled with the previously entered data"
